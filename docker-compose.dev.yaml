version: '3.8'

# Development docker-compose with hot-reloading
# Usage: docker-compose -f docker-compose.dev.yaml up

services:
  # Upload Service with hot-reload
  upload-service:
    image: node:20-slim
    container_name: finance-analysis-upload-dev
    working_dir: /app
    ports:
      - "8000:8000"
    volumes:
      - ./backend/upload-service:/app
      - upload_node_modules:/app/node_modules
      - ${USERPROFILE}/.azure:/root/.azure:ro  # Mount Azure CLI credentials for DefaultAzureCredential
    env_file:
      - ./backend/upload-service/.env
    command: >
      sh -c "apt-get update && apt-get install -y curl && 
             curl -sL https://aka.ms/InstallAzureCLIDeb | bash &&
             npm install && npx nodemon --legacy-watch app.js"

  # Insights Service with hot-reload
  insights-service:
    image: node:20-slim
    container_name: finance-analysis-insights-dev
    working_dir: /app
    ports:
      - "9000:9000"
    volumes:
      - ./backend/insights-service:/app
      - insights_node_modules:/app/node_modules
      - ${USERPROFILE}/.azure:/root/.azure:ro  # Mount Azure CLI credentials for DefaultAzureCredential
    env_file:
      - ./backend/insights-service/.env
    command: >
      sh -c "apt-get update && apt-get install -y curl && 
             curl -sL https://aka.ms/InstallAzureCLIDeb | bash &&
             npm install && npx nodemon --legacy-watch app.js"

  # Monitor Service with hot-reload
  monitor-service:
    image: node:20-slim
    container_name: finance-analysis-monitor-dev
    working_dir: /app
    ports:
      - "8999:8999"
    volumes:
      - ./backend/monitor-service:/app
      - monitor_node_modules:/app/node_modules
      - ${USERPROFILE}/.azure:/root/.azure:ro  # Mount Azure CLI credentials for DefaultAzureCredential
    env_file:
      - ./backend/monitor-service/.env
    environment:
      - UPLOAD_SERVICE_URL=http://upload-service:8000
      - INSIGHTS_SERVICE_URL=http://insights-service:9000
      - INVESTMENT_SERVICE_URL=http://investment-service:3004
    command: >
      sh -c "apt-get update && apt-get install -y curl && 
             curl -sL https://aka.ms/InstallAzureCLIDeb | bash &&
             npm install && npx nodemon --legacy-watch app.js"

  # Investment Service with hot-reload
  investment-service:
    image: node:20-slim
    container_name: finance-analysis-investment-dev
    working_dir: /app
    ports:
      - "3004:3004"
    volumes:
      - ./backend/investment-service:/app
      - investment_node_modules:/app/node_modules
      - ${USERPROFILE}/.azure:/root/.azure:ro  # Mount Azure CLI credentials for DefaultAzureCredential
    env_file:
      - ./backend/investment-service/.env
    command: >
      sh -c "apt-get update && apt-get install -y curl && 
             curl -sL https://aka.ms/InstallAzureCLIDeb | bash &&
             npm install && npx nodemon --legacy-watch app.js"

  # Frontend with React hot-reload
  frontend:
    image: node:20-alpine
    container_name: finance-analysis-frontend-dev
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - REACT_APP_UPLOAD_SERVICE_ENDPOINT=http://localhost:8000
      - REACT_APP_INSIGHTS_SERVICE_ENDPOINT=http://localhost:9000
      - REACT_APP_MONITOR_SERVICE_ENDPOINT=http://localhost:8999
      - REACT_APP_STOCK_SERVICE_URL=http://localhost:3004
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    command: sh -c "npm install && npm start"
    stdin_open: true
    tty: true
    depends_on:
      - upload-service
      - insights-service
      - monitor-service
      - investment-service

# Named volumes to persist node_modules (faster restarts)
volumes:
  upload_node_modules:
  insights_node_modules:
  monitor_node_modules:
  investment_node_modules:
  frontend_node_modules:
